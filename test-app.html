<!DOCTYPE html>
<html><body>
<div id="root"></div>
<div id="log" style="white-space:pre-wrap;font-family:monospace"></div>
<script type="module">
const log = document.getElementById('log');
function add(m) { log.textContent += m + '\n'; }

try {
  add('1. Starting import...');
  const App = (await import('http://localhost:5173/src/app/App.tsx')).default;
  add('2. App loaded: ' + (typeof App));
  
  const React = (await import('http://localhost:5173/node_modules/.vite/deps/react.js?v=f1e4f2d3')).default;
  const ReactDOM = (await import('http://localhost:5173/node_modules/.vite/deps/react-dom_client.js?v=f1e4f2d3')).default;
  add('3. React loaded');
  
  const root = document.getElementById('root');
  ReactDOM.createRoot(root).render(React.createElement(App));
  add('4. Rendered');
} catch(e) {
  add('ERROR: ' + e.message);
  add('STACK: ' + (e.stack || '').substring(0, 300));
}
</script>
</body>
</html>
