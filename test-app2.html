<!DOCTYPE html>
<html><body>
<div id="root"></div>
<div id="log" style="white-space:pre-wrap;font-family:monospace"></div>
<script type="module">
const log = document.getElementById('log');
function add(m) { log.textContent += m + '\n'; }

try {
  const [React, ReactDOM] = await Promise.all([
    import('http://localhost:5173/node_modules/.vite/deps/react.js?v=f1e4f2d3').then(m => m.default || m),
    import('http://localhost:5173/node_modules/.vite/deps/react-dom_client.js?v=f1e4f2d3').then(m => m.default || m),
  ]);
  add('React ready');
  
  const App = (await import('http://localhost:5173/src/app/App.tsx')).default;
  add('App loaded');
  
  const root = document.getElementById('root');
  const container = React.createElement('div', null, 
    React.createElement('div', { style: {padding:20,color:'red'} }, 'TEST_MARKER'),
    React.createElement(App)
  );
  ReactDOM.createRoot(root).render(container);
  add('Rendered');
  
  setTimeout(() => {
    add('ROOT HTML: ' + (root.innerHTML || '(empty)').substring(0, 200));
    add('ROOT childCount: ' + root.childElementCount);
  }, 2000);
} catch(e) {
  add('ERROR: ' + e.message);
  add(e.stack?.substring(0, 300) || '');
}
</script>
</body>
</html>
