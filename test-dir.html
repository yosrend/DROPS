<!DOCTYPE html>
<html><body>
<div id="root"></div>
<script type="module">
import {createElement: h, StrictMode} from 'http://localhost:5173/node_modules/.vite/deps/react.js?v=f1e4f2d3';
import {createRoot} from 'http://localhost:5173/node_modules/.vite/deps/react-dom_client.js?v=f1e4f2d3';

// Test: does React actually render ANYTHING from the App?
const App = (await import('http://localhost:5173/src/app/App.tsx')).default;

const root = document.getElementById('root');
// First check: does App component exist?
if (typeof App !== 'function') {
  root.textContent = 'App is not a function: ' + typeof App;
} else {
  // Try rendering with a wrapper
  try {
    createRoot(root).render(
      h('div', { id: 'wrapper' }, 
        h('div', { style: {padding: 20, background: 'yellow'} }, 'VISIBLE_MARKER'),
        h(StrictMode, null, h(App))
      )
    );
    root.innerHTML += '<div style="margin-top:20px">RENDER_COMPLETED</div>';
  } catch(e) {
    root.textContent = 'RENDER ERROR: ' + e.message;
  }
}
</script>
</body>
</html>
