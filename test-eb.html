<!DOCTYPE html>
<html><body>
<div id="root"></div>
<script type="module">
import {createElement: h, Component, StrictMode} from 'http://localhost:5173/node_modules/.vite/deps/react.js?v=f1e4f2d3';
import {createRoot} from 'http://localhost:5173/node_modules/.vite/deps/react-dom_client.js?v=f1e4f2d3';

class ErrorBoundary extends Component {
  constructor(props) { super(props); this.state = {error: null}; }
  static getDerivedStateFromError(error) { return {error}; }
  componentDidCatch(error, info) { console.error('Caught:', error, info); }
  render() {
    if (this.state.error) {
      return h('div', {style:{color:'red',padding:20}},
        'ERROR: ' + this.state.error.message,
        h('pre', {style:{fontSize:12,marginTop:8}}, this.state.error.stack || '')
      );
    }
    return this.props.children;
  }
}

try {
  const App = (await import('http://localhost:5173/src/app/App.tsx')).default;
  const root = document.getElementById('root');
  createRoot(root).render(h(StrictMode, null, h(ErrorBoundary, null, h(App))));
  
  setTimeout(() => {
    root.innerHTML += '<hr><div style="padding:10px;background:#eee">AFTER 3s - children: ' + root.childElementCount + '</div>';
  }, 3000);
} catch(e) {
  document.getElementById('root').textContent = 'MODULE ERROR: ' + e.message;
}
</script>
</body>
</html>
