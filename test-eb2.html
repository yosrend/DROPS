<!DOCTYPE html>
<html><body>
<div id="root"></div>
<script type="module">
import React from 'http://localhost:5173/node_modules/.vite/deps/react.js?v=f00f38c6';
import ReactDOM from 'http://localhost:5173/node_modules/.vite/deps/react-dom_client.js?v=f00f38c6';

const {createElement: h, Component} = React;

class ErrorBoundary extends Component {
  state = { error: null };
  static getDerivedStateFromError(error) { return { error }; }
  render() {
    if (this.state.error) {
      return h('div', { style: { color: 'red', padding: 20, whiteSpace: 'pre-wrap', fontFamily: 'monospace' } },
        'ERROR CAUGHT:',
        h('div', null, this.state.error.message || String(this.state.error)),
        h('pre', { style: { fontSize: 12, marginTop: 8 } }, this.state.error.stack || '')
      );
    }
    return this.props.children;
  }
}

const App = (await import('http://localhost:5173/src/app/App.tsx')).default;

const root = document.getElementById('root');
try {
  ReactDOM.createRoot(root).render(
    h(ErrorBoundary, null,
      h('div', { style: { padding: 20, background: 'yellow' } }, 'BEFORE_APP'),
      h(App)
    )
  );
} catch(e) {
  root.textContent = 'SYNC ERROR: ' + e.message;
}
</script>
</body>
</html>
