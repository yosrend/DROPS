<!DOCTYPE html>
<html><body>
<div id="root"></div>
<div id="err" style="white-space:pre-wrap;font-family:monospace;color:red"></div>
<script>
window.onerror = function(msg, url, line) {
  document.getElementById('err').textContent += 'onerror: ' + msg + ' at ' + line + '\n';
};
window.addEventListener('unhandledrejection', function(e) {
  document.getElementById('err').textContent += 'unhandledrejection: ' + (e.reason?.message || e.reason) + '\n';
});
</script>
<script type="module">
const err = document.getElementById('err');
try {
  const [{createElement: h, StrictMode}, {createRoot}] = await Promise.all([
    import('http://localhost:5173/node_modules/.vite/deps/react.js?v=f1e4f2d3'),
    import('http://localhost:5173/node_modules/.vite/deps/react-dom_client.js?v=f1e4f2d3'),
  ]);
  err.textContent += 'deps loaded\n';
  
  const App = (await import('http://localhost:5173/src/app/App.tsx')).default;
  err.textContent += 'App loaded\n';
  
  const root = document.getElementById('root');
  createRoot(root).render(h(StrictMode, null, h('div', null, 'MARKER', h(App))));
  err.textContent += 'render called\n';
  
} catch(e) {
  err.textContent += 'CATCH: ' + e.message + '\n' + (e.stack || '').substring(0, 300) + '\n';
}
</script>
</body>
</html>
