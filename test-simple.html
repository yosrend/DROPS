<!DOCTYPE html>
<html><body>
<div id="root"></div>
<script type="module">
import React from 'http://localhost:5173/node_modules/.vite/deps/react.js?v=f1e4f2d3';
import ReactDOM from 'http://localhost:5173/node_modules/.vite/deps/react-dom_client.js?v=f1e4f2d3';
const root = document.getElementById('root');
root.textContent = 'Loading...';
try {
  ReactDOM.createRoot(root).render(React.createElement('div', null, 'HELLO REACT'));

}
